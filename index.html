<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=B612+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Michroma&display=swap"
        rel="stylesheet">
    <title>Boeing Enters the Jet Age</title>
    <style>
        h1,
        h4 {
            text-align: center;
            padding-top: 20px;
        }

        main {
            text-align: center;
            align-items: center;
        }

        #historybuilding {
            width: 50%;
            height: auto;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        #aircraftlineup {
            width: 50%;
            height: auto;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        img {
            padding: 12px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <img src="images/logo.png" class="logo" alt="Boeing Logo">
                <li><a href="index.html">Home</a></li>
                <li><a href="history.html">History of Boeing</a></li>
                <li><a href="aircrafts.html">List of Boeing Aircraft</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>The Boeing Co.</h1>
        <h4>For the Boeing fans</h4>
        <img id="historybuilding" src="images/history-of-boeing.png" alt="Historical picture of Boeing">
        <a href="history.html">History</a>
        <br>
        <img id="aircraftlineup" src="images/BoeingLine-up.jpg" alt="Lineup of Boeing Aircraft">
        <a href="aircrafts.html">All Boeing Aircraft</a>

        <!-- Slideshow container -->
        <div class="slideshow-container">
            <div class="mySlides fade">
                <div class="numbertext">1 / 6</div>
                <img src="images/707.webp" style="width:100%">
            </div>

            <div class="mySlides fade">
                <div class="numbertext">2 / 6</div>
                <img src="images/717.webp" style="width:100%">
            </div>

            <div class="mySlides fade">
                <div class="numbertext">3 / 6</div>
                <img src="images/727.webp" style="width:100%">
            </div>

            <div class="mySlides fade">
                <div class="numbertext">4 / 6</div>
                <img src="images/737.webp" style="width:100%">
            </div>

            <div class="mySlides fade">
                <div class="numbertext">5 / 6</div>
                <img src="images/747.webp" style="width:100%">
            </div>

            <div class="mySlides fade">
                <div class="numbertext">6 / 6</div>
                <img src="images/pa707.jpg" style="width:100%">
            </div>

            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
        <br>

        <!-- The dots/circles -->
        <div style="text-align:center">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
            <span class="dot" onclick="currentSlide(4)"></span>
            <span class="dot" onclick="currentSlide(5)"></span>
            <span class="dot" onclick="currentSlide(6)"></span>
        </div>
    </main>
    <footer>
        <p>Copyright &copy; 2026 Kaleb Johnsen.</p>
    </footer>
    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function currentSlide(n) {
            showSlides(slideIndex = n);
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let dots = document.getElementsByClassName("dot");
            if (n > slides.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = slides.length }
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }
            slides[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].className += " active";
        }
    </script>
</body>

</html>
